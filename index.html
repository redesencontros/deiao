<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DANÇA é isso aqui, ó</title>

<style>
@font-face {
    font-family: "MyFont";
    src: url("https://redesencontros.github.io/dancaeissoaquio/assets/fonts/jost3.woff2") format("woff2");
    font-weight: 370;
    font-style: normal;
}
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

    /* DISABLE TEXT SELECTION GLOBALLY */
*,
*::before,
*::after {
    user-select: none;         /* standard */
    -webkit-user-select: none; /* Safari/Chrome */
    -moz-user-select: none;    /* Firefox */
    -ms-user-select: none;     /* IE/Edge */
}
    
html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    font-family: sans-serif;
    background: transparent;
}
#fullscreenHTML {
    pointer-events: auto;
}

/* BACKGROUND */
#backgroundApp {
    position: fixed;
    inset: 0;
    z-index: 0;
    background: #333635;
}

#backgroundApp canvas {
    display: block;
}

/* GAME LAYER */
#gameLayer {
    position: relative;
    z-index: 3;
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    pointer-events: none;   /* ⭐ IMPORTANT */
}

/* DEFAULT HEADER (desktop first) */
#header {
    width: 100%;
    display: flex;
    justify-content: center;
    padding-top: 3vh;
    flex-shrink: 0;
    position: relative;
    z-index: 3;
}

#header img {
    width: clamp(100px, 18vw, 300px); /* desktop: bigger image */
    height: auto;
}

/* MOBILE HEADER */
@media (max-width: 767px) {
    #header {
        justify-content: flex-start;   /* align left on mobile */
       padding-top: 20px; /* match #menuButton top */
        padding-left: 20px; /* optional: align with hamburger */
    }

    #header img {
        width: clamp(80px, 50vw, 150px); /* smaller on mobile */
        height: auto;
    }
}

/* CONTENT */
#contentDisplay {
    flex: 1; /* takes remaining vertical space */
    min-height: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 0;
    overflow-y: hidden;
    z-index: 2;
}

#contentDisplay img,
#contentDisplay video,
#contentDisplay div {
    max-width: 100%;
    max-height: 100%;
    padding: 2vh 2vw;
    box-sizing: border-box;
}


/* BUTTON */
#gameButton {
    background: none;
    border: none;
    cursor: pointer;
    margin-bottom: 4vh;
    align-self: center;
    flex-shrink: 0;
    position: relative;
    z-index: 4;
    transition: transform 0.08s ease, filter 0.08s ease;
}

#gameButton:active {
    transform: scale(0.9);
    filter: brightness(0.8);
}
#gameButton,
#gameButton * {
    pointer-events: auto;
}

#contentDisplay iframe {
    pointer-events: auto;
}


#gameButton img {
    width: clamp(50px, 6vw, 100px);
    height: auto;
}
/* DOTS BACKGROUND */
canvas {
    position: fixed;
    inset: 0;
    width: 100vw;
    height: 100vh;
    pointer-events: none;
    z-index: 1;
}

#backgroundApp {
    z-index: 0;
}

#gameLayer {
    position: relative;
    z-index: 5;
}
/* =========================
   HAMBURGER MENU
========================= */

#menuButton {
    position: fixed;
    top: 20px;
    right: 20px;
    width: 32px;
    height: 24px;
    z-index: 9999;
    cursor: pointer;
    pointer-events: auto;
}

#menuButton span {
    display: block;
    height: 3px;
    background: white;
    margin: 5px 0;
    transition: transform 0.3s, opacity 0.3s;
}

/* ANIMATION */

#menuButton.open span:nth-child(1) {
    transform: translateY(8px) rotate(45deg);
}

#menuButton.open span:nth-child(2) {
    opacity: 0;
}

#menuButton.open span:nth-child(3) {
    transform: translateY(-8px) rotate(-45deg);
}

/* =========================
   MENU DROPDOWN
========================= */

#menuDropdown {
    position: fixed;
    top: 60px;
    right: 20px;
    z-index: 9999;
    display: none;
    flex-direction: column;
    font-family: MyFont, sans-serif;
    background: rgba(0,0,0,0.3);
    backdrop-filter: blur(4px);
}

.menuItem {
    color: white;
    padding: 8px 12px;
    cursor: pointer;
}
/* =========================
   MENU CONTENT CONTAINER
========================= */

#menuContent {
    flex: 1;
    min-height: 0;
    display: none;
    justify-content: center;
    align-items: flex-start;   /* FIX */
    overflow-y: auto;
    padding: 2vh 2vw;
    margin: 4vh 0;
    font-family: MyFont, sans-serif;
    color: white;
    z-index: 3;
    pointer-events: auto;
}

/* MENU LINKS */

#menuContent a {
    color: #d0e422;
    text-decoration: none;
}

#menuContent a:hover {
    text-decoration: underline;
    opacity: 0.8;
}

/* HIDE SCROLLBAR BUT KEEP SCROLLING */

#menuContent::-webkit-scrollbar {
    display: none;
}

#menuContent {
    -ms-overflow-style: none;
    scrollbar-width: none;
}
/* FADE EDGES OF MENU TEXT */

#menuContent {
    mask-image: linear-gradient(
        to bottom,
        transparent 0%,
        black 8%,
        black 92%,
        transparent 100%
    );

    -webkit-mask-image: linear-gradient(
        to bottom,
        transparent 0%,
        black 8%,
        black 92%,
        transparent 100%
    );
}
/* MENU ITEM HOVER FEEDBACK */
.menuItem {
    transition: transform 0.15s ease, color 0.15s ease;
}

.menuItem:hover {
    color: #d0e422; /* bright color feedback */
    transform: scale(1.05); /* subtle zoom effect */
}
/* FILM-STYLE CREDITS LAYOUT */

.creditsGrid {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    column-gap: clamp(20px,3vw,60px);
    row-gap: 3x;
    width: 100%;
}

.creditsGrid .role {
    grid-column: 1;
    justify-self: end;
    opacity: 0.75;
    letter-spacing: 0.04em;
    text-transform: uppercase;
font-size: 0.75em;
}

.creditsGrid .name {
    grid-column: 3;
    justify-self: start;
    font-size: 1.1em;
}

/* MOBILE */

@media (max-width: 767px) {

    .creditsGrid {
        grid-template-columns: 1fr;
        text-align: center;
    }

    .creditsGrid .role,
    .creditsGrid .name {
        grid-column: 1;
        justify-self: center;
    }

}
</style>
</head>
<body>

<!-- BACKGROUND -->
<div id="backgroundApp">
    <canvas id="canvas"></canvas>
</div>

<!-- GAME LAYER -->
<div id="gameLayer">

    <div id="header">
        <img id="headerImage">
    </div>

    <div id="contentDisplay"></div>

    <div id="menuContent"></div>

    <button id="gameButton">
        <img id="buttonImage">
    </button>

</div>
<!-- =========================
     MENU BUTTON
========================= -->

<div id="menuButton">
    <span></span>
    <span></span>
    <span></span>
</div>

<div id="menuDropdown">
    <div class="menuItem" data-page="https://redesencontros.github.io/dancaeissoaquio/content/sobre.txt">SOBRE</div>
    <div class="menuItem" data-page="https://redesencontros.github.io/dancaeissoaquio/content/historico.txt">HISTÓRICO</div>
    <div class="menuItem" data-page="https://redesencontros.github.io/dancaeissoaquio/content/ficha.txt">FICHA TÉCNICA</div>
</div>
<script>
document.addEventListener("contextmenu", function (e) {
    e.preventDefault();
});

/* =========================
   AMEBA BOIDS BACKGROUND (WEBGL RENDER)
========================= */

const canvas = document.getElementById("canvas");
const gl = canvas.getContext("webgl") || canvas.getContext("experimental-webgl");

let width, height;

function resize() {
  width = canvas.width = window.innerWidth;
  height = canvas.height = window.innerHeight;
  gl.viewport(0, 0, width, height);
}
window.addEventListener("resize", resize);
resize();

/* ---------- SHADERS ---------- */

const vertexShaderSource = `
attribute vec2 a_position;
uniform vec2 u_resolution;

void main() {
  vec2 zeroToOne = a_position / u_resolution;
  vec2 zeroToTwo = zeroToOne * 2.0;
  vec2 clipSpace = zeroToTwo - 1.0;
  gl_Position = vec4(clipSpace * vec2(1, -1), 0, 1);
  gl_PointSize = 1.0;
}
`;

const fragmentShaderSource = `
precision mediump float;
void main() {
  gl_FragColor = vec4(0.4, 0.4, 0.4, 0.4);
}
`;

function createShader(type, source) {
  const shader = gl.createShader(type);
  gl.shaderSource(shader, source);
  gl.compileShader(shader);
  return shader;
}

const vertexShader = createShader(gl.VERTEX_SHADER, vertexShaderSource);
const fragmentShader = createShader(gl.FRAGMENT_SHADER, fragmentShaderSource);

const program = gl.createProgram();
gl.attachShader(program, vertexShader);
gl.attachShader(program, fragmentShader);
gl.linkProgram(program);
gl.useProgram(program);

const positionLocation = gl.getAttribLocation(program, "a_position");
const resolutionLocation = gl.getUniformLocation(program, "u_resolution");

const positionBuffer = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, positionBuffer);

gl.enableVertexAttribArray(positionLocation);
gl.vertexAttribPointer(positionLocation, 2, gl.FLOAT, false, 0, 0);

/* ---------- BOIDS (UNCHANGED LOGIC) ---------- */

const isMobile = window.innerWidth < 768;
const BOID_COUNT = isMobile ? 500 : 2000;
const boids = [];
let frame = 0;
const perception = 30;
const cellSize = perception;
let grid = {};

function buildGrid() {
  grid = {};
  for (let i = 0; i < boids.length; i++) {
    const b = boids[i];
    const cx = Math.floor(b.x / cellSize);
    const cy = Math.floor(b.y / cellSize);
    const key = cx + "," + cy;
    if (!grid[key]) grid[key] = [];
    grid[key].push(b);
  }
}

function getNearbyBoids(boid) {
  const cx = Math.floor(boid.x / cellSize);
  const cy = Math.floor(boid.y / cellSize);
  let neighbors = [];
  for (let x = -1; x <= 1; x++) {
    for (let y = -1; y <= 1; y++) {
      const key = (cx + x) + "," + (cy + y);
      if (grid[key]) neighbors = neighbors.concat(grid[key]);
    }
  }
  return neighbors;
}

const entrySide = Math.floor(Math.random() * 4);

let driftAngle = 0;
const driftRadius = 120;
let wavePhase = 0;
let driftDirection = 1;
let driftChaos = 0;
let flowTime = 0;
const flowScale = 0.003;

class Boid {
  constructor() {
    const clusterRadius = 150;
    const angle = Math.random() * Math.PI * 2;
    const r = Math.random() * clusterRadius;
    const far = 300;

    if (entrySide === 0) {
      this.x = -far + Math.cos(angle) * r;
      this.y = height / 2 + Math.sin(angle) * r;
      this.vx = 3.5;
      this.vy = (Math.random() - 0.5) * 0.4;
    }
    if (entrySide === 1) {
      this.x = width + far + Math.cos(angle) * r;
      this.y = height / 2 + Math.sin(angle) * r;
      this.vx = -3.5;
      this.vy = (Math.random() - 0.5) * 0.4;
    }
    if (entrySide === 2) {
      this.x = width / 2 + Math.cos(angle) * r;
      this.y = -far + Math.sin(angle) * r;
      this.vx = (Math.random() - 0.5) * 0.4;
      this.vy = 3.5;
    }
    if (entrySide === 3) {
      this.x = width / 2 + Math.cos(angle) * r;
      this.y = height + far + Math.sin(angle) * r;
      this.vx = (Math.random() - 0.5) * 0.4;
      this.vy = -3.5;
    }
  }

  update() {
    let alignX = 0, alignY = 0;
    let cohesionX = 0, cohesionY = 0;
    let separationX = 0, separationY = 0;
    let count = 0;

    const perceptionSq = perception * perception;
    const neighbors = getNearbyBoids(this);

    for (let other of neighbors) {
      if (other === this) continue;
      const dx = other.x - this.x;
      const dy = other.y - this.y;
      const distSq = dx * dx + dy * dy;

      if (distSq < perceptionSq) {
        alignX += other.vx;
        alignY += other.vy;
        cohesionX += other.x;
        cohesionY += other.y;

        if (distSq < 60) {
          separationX -= dx;
          separationY -= dy;
        }
        count++;
      }
    }

    if (count > 0) {
      alignX /= count;
      alignY /= count;
      cohesionX /= count;
      cohesionY /= count;

      this.vx += (alignX - this.vx) * 0.05;
      this.vy += (alignY - this.vy) * 0.05;
      this.vx += (cohesionX - this.x) * 0.0015;
      this.vy += (cohesionY - this.y) * 0.0015;
      this.vx += separationX * 0.02;
      this.vy += separationY * 0.02;
    }

    const globalPull = 0.00015;

const driftX = width/2 + Math.cos(driftAngle + this.x*0.002) * driftRadius;
const driftY = height/2 + Math.sin(driftAngle + this.y*0.002) * driftRadius;

this.vx += (driftX - this.x) * globalPull;
this.vy += (driftY - this.y) * globalPull;

/* vertical balance */
this.vy += (height/2 - this.y) * 0.00005;
this.vx += Math.sin(wavePhase + this.x * 0.01) * 0.05;
this.vy += Math.cos(wavePhase + this.y * 0.01) * 0.05;

/* ORGANIC FLOW FIELD (non-rotational) */

const nx = this.x * flowScale;
const ny = this.y * flowScale;

const fx = Math.sin(nx + flowTime);
const fy = Math.cos(ny + flowTime * 0.8);

this.vx += fx * 0.05;
this.vy += fy * 0.05;

/* directional drift */
this.vx += Math.sin(flowTime * 0.2) * 0.01;

    // tiny turbulence to prevent circular equilibrium
this.vx += (Math.random() - 0.5) * 0.03;
this.vy += (Math.random() - 0.5) * 0.03;
const speedSq = this.vx * this.vx + this.vy * this.vy;
    const maxSpeed = 3;
    if (speedSq > maxSpeed * maxSpeed) {
      const scale = maxSpeed / Math.sqrt(speedSq);
      this.vx *= scale;
      this.vy *= scale;
    }

    this.x += this.vx;
    this.y += this.vy;
  }
}

for (let i = 0; i < BOID_COUNT; i++) {
  boids.push(new Boid());
}

const positions = new Float32Array(BOID_COUNT * 2);
gl.bufferData(gl.ARRAY_BUFFER, positions.byteLength, gl.DYNAMIC_DRAW);

function animate() {
  frame++;

  flowTime += 0.004;
// occasionally flip rotation direction
if (Math.random() < 0.002) {
    driftDirection *= -1;
}

// chaotic drift movement
driftChaos += (Math.random() - 0.5) * 0.02;

driftAngle += (0.002 + driftChaos) * driftDirection;

wavePhase += 0.015;

  buildGrid();

  for (let i = 0; i < boids.length; i++) {

  if (i % 5 === frame % 5) {
    boids[i].update();
  }

  positions[i * 2] = boids[i].x;
  positions[i * 2 + 1] = boids[i].y;
}

  gl.clearColor(0.2, 0.212, 0.208, 1);
  gl.clear(gl.COLOR_BUFFER_BIT);

  gl.uniform2f(resolutionLocation, width, height);
  gl.bufferSubData(gl.ARRAY_BUFFER, 0, positions);
  gl.drawArrays(gl.POINTS, 0, BOID_COUNT);

  requestAnimationFrame(animate);
}

animate();

/* =========================
   GAME LOGIC
========================= */

const CONFIG = {
    headerImage: "https://redesencontros.github.io/dancaeissoaquio/assets/header.png",
    buttonImage: "https://redesencontros.github.io/dancaeissoaquio/assets/button.png",
    buttonSound: "https://redesencontros.github.io/dancaeissoaquio/assets/button-sound.mp3",
    menuBackgroundSound: "https://redesencontros.github.io/dancaeissoaquio/assets/menu-loop.ogg",
    contentListTxt: "https://redesencontros.github.io/dancaeissoaquio/content-list.txt"
};

let deck = [];
let currentIndex = 0;
let currentAudio = null;
let buttonClickSound = new Audio(CONFIG.buttonSound);

/* =========================
   GAPLESS MENU AUDIO (WebAudio)
========================= */

const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

let menuBuffer = null;
let menuSource = null;

/* VOLUME CONTROL */
let menuGain = audioCtx.createGain();
menuGain.gain.value = 0.2; // ⭐ menu volume (0.0 → 1.0)
menuGain.connect(audioCtx.destination);

/* preload and decode audio once */
fetch(CONFIG.menuBackgroundSound)
    .then(r => r.arrayBuffer())
    .then(data => audioCtx.decodeAudioData(data))
    .then(buffer => {
        menuBuffer = buffer;
    });

function startMenuLoop() {

    if (!menuBuffer) return;
    if (menuSource) return;

    menuSource = audioCtx.createBufferSource();
    menuSource.buffer = menuBuffer;
    menuSource.loop = true;

    menuSource.connect(menuGain);
    menuSource.start(0);
}

function stopMenuLoop() {

    if (menuSource) {
        menuSource.stop();
        menuSource.disconnect();
        menuSource = null;
    }
}

/* MENU BACKGROUND AUDIO (created once) */
let menuBackgroundAudio = new Audio(CONFIG.menuBackgroundSound);
menuBackgroundAudio.loop = true;
menuBackgroundAudio.preload = "auto";

document.getElementById("headerImage").src = CONFIG.headerImage;
document.getElementById("buttonImage").src = CONFIG.buttonImage;

fetch(CONFIG.contentListTxt)
    .then(res => res.text())
    .then(text => {
        deck = text.split("\n").map(l => l.trim()).filter(l => l);
        shuffle(deck);
    });

function shuffle(array) {
    for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
    }
}

document.getElementById("gameButton").addEventListener("click", () => {
document.getElementById("menuContent").style.display = "none";
    if (!deck.length) {
        console.log("Deck not loaded yet");
        return;
    }

    buttonClickSound.currentTime = 0;
    buttonClickSound.play();

    if (currentAudio) {
        currentAudio.pause();
        currentAudio = null;
    }

    if (currentIndex >= deck.length) {
        shuffle(deck);
        currentIndex = 0;
    }

    showContent(deck[currentIndex++]);
});

function showContent(url) {

    if (window.__destroyDots) {
        window.__destroyDots();
    }

    const gameDisplay = document.getElementById("contentDisplay");
const menuDisplay = document.getElementById("menuContent");

const isMenu = url.includes("/content/");

/* MENU AUDIO CONTROL (GAPLESS) */

if (isMenu) {

    if (audioCtx.state === "suspended") {
        audioCtx.resume();
    }

    startMenuLoop();

} else {

    stopMenuLoop();

}

const display = isMenu ? menuDisplay : gameDisplay;
gameDisplay.innerHTML = "";
menuDisplay.innerHTML = "";
display.innerHTML = "";

if (isMenu) {
    menuDisplay.style.display = "flex";
    gameDisplay.style.display = "none";
} else {
    menuDisplay.style.display = "none";
    gameDisplay.style.display = "flex";
}

    // REMOVE fullscreen anterior
    const existingFullscreen = document.getElementById("fullscreenHTML");
    if (existingFullscreen) existingFullscreen.remove();

    const lower = url.toLowerCase();

    /* =========================
       IMAGENS
    ========================= */
    if (lower.match(/\.(jpg|jpeg|png|gif|webp)$/)) {
        const img = document.createElement("img");
        img.src = url;
        display.appendChild(img);
    }

    /* =========================
       VÍDEO
    ========================= */
    else if (lower.match(/\.(mp4|webm)$/)) {
        const video = document.createElement("video");
        video.src = url;
        video.loop = true;
        video.playsInline = true;
        video.controls = false;
        video.autoplay = true;
        video.muted = false;
        video.preload = "auto";

        display.appendChild(video);

        video.play().catch(err => {
            console.log("Autoplay blocked:", err);
        });
    }

    /* =========================
       ÁUDIO
    ========================= */
    else if (lower.match(/\.(mp3|wav|ogg)$/)) {
        const audio = new Audio(url);
        audio.loop = true;
        audio.play();
        currentAudio = audio;
    }

   /* =========================
   TEXT (.txt)
========================= */

else if (lower.match(/\.txt$/)) {

    fetch(url)
        .then(res => {
            if (!res.ok) throw new Error("Conteúdo não encontrado");
            return res.text();
        })
        .then(text => {

            let align = "center";
            let lines = text.split("\n");

            if (lines[0].startsWith("#align:")) {
                align = lines[0].replace("#align:", "").trim();
                lines.shift();
            }

            const div = document.createElement("div");

            div.style.textAlign = align;
            div.style.alignSelf = "stretch";
            div.style.hyphens = "auto";
            div.style.lineHeight = "1.4em";
            div.style.fontFamily = "MyFont, sans-serif";
            div.style.fontSize = "1.1em";
            div.style.whiteSpace = "pre-wrap";

            /* DIFFERENT BEHAVIOR MENU vs GAME */

            if (isMenu) {

                div.style.maxWidth = "900px";
                div.style.width = "100%";
                div.style.margin = "0 auto";
                div.style.padding = "4vh 20px";
                div.style.overflowY = "visible";   // container scrolls instead

            } else {

                div.style.maxWidth = "900px";
                div.style.margin = "0 auto";
                div.style.padding = "2vh 20px";
                div.style.overflowY = "visible";   // prevent internal scrollbar

            }

            let currentColor = "white";
            let currentColumns = null;
            let currentSize = "1.1em";
            let inCredits = false;
            let creditsGrid = null;
            
            lines.forEach(line => {

                line = line.trim();

if (line.startsWith("#size:")) {
    currentSize = line.replace("#size:", "").trim();
    return;
}

                if (line.startsWith("#color:")) {
                    let c = line.replace("#color:", "").trim();
                    if (c.startsWith("#") && c.length === 7) c = c.toLowerCase();
                    currentColor = c;
                    return;
                }

                
if (line.startsWith("#credits")) {

    inCredits = true;

    creditsGrid = document.createElement("div");
creditsGrid.className = "creditsGrid";

   creditsGrid.className = "creditsGrid";

    div.appendChild(creditsGrid);

    return;
}

if (line.startsWith("#endcredits")) {
    inCredits = false;
    return;
}
if (inCredits && line.includes("|")) {

    const parts = line.split("|");
    const role = parts[0].trim();
    const name = parts[1].trim();

    const roleSpan = document.createElement("span");
    const nameSpan = document.createElement("span");

    roleSpan.className = "role";
nameSpan.className = "name";

    roleSpan.textContent = role;
    roleSpan.style.whiteSpace = "nowrap";
    nameSpan.textContent = name;

    /* RESPONSIVE ALIGNMENT */

    if (window.innerWidth < 768) {

        roleSpan.style.textAlign = "center";
        nameSpan.style.textAlign = "center";

    } else {

        roleSpan.style.textAlign = "right";
        nameSpan.style.textAlign = "left";

    }

    roleSpan.style.opacity = "0.65";

    roleSpan.style.color = currentColor;
    nameSpan.style.color = currentColor;

    /* SPACE BEFORE NEW ROLE GROUP */

    if (role !== "") {
        roleSpan.style.marginTop = "14px";
        nameSpan.style.marginTop = "14px";
    }

    creditsGrid.appendChild(roleSpan);
    creditsGrid.appendChild(nameSpan);

    return;
}

                if (line.startsWith("#image:")) {

                    const url = line.replace("#image:", "").trim();

                    const img = document.createElement("img");
                    img.src = url;
                    img.style.maxWidth = "100%";
                    img.style.display = "block";
                    img.style.margin = "20px auto";

                    div.appendChild(img);
                    return;
                }

                if (line.startsWith("#video:")) {

                    const url = line.replace("#video:", "").trim();

                    const video = document.createElement("video");
                    video.src = url;
                    video.controls = true;
                    video.style.maxWidth = "100%";
                    video.style.display = "block";
                    video.style.margin = "20px auto";

                    div.appendChild(video);
                    return;
                }

                if (line.startsWith("#link:")) {

                    const url = line.replace("#link:", "").trim();

                    const a = document.createElement("a");
                    a.href = url;
                    a.innerText = url;
                    a.target = "_blank";
                    a.style.cssText = `color:${currentColor};display:block;margin:10px 0;`;

                    div.appendChild(a);
                    return;
                }

                if (line.trim() === "") {

                    const spacer = document.createElement("div");
                    spacer.style.height = "1.2em";

                    div.appendChild(spacer);
                    return;
                }

                const lineSpan = document.createElement("span");

                lineSpan.style.display = "block";
                lineSpan.style.color = currentColor;
                lineSpan.style.fontSize = currentSize;
                lineSpan.innerHTML = line
    .replace(/__(.*?)__/g, "<u>$1</u>")
    .replace(/\*\*(.*?)\*\*/g, "<b>$1</b>")
    .replace(/\*(.*?)\*/g, "<i>$1</i>")
    .replace(/\[(.*?)\]\((.*?)\)/g, '<a href="$2" target="_blank">$1</a>');


                div.appendChild(lineSpan);

            });

            display.appendChild(div);
           
        })
        .catch(err => {

            display.innerHTML = "<div style='color:white'>Conteúdo não encontrado</div>";
            console.error(err);

        });
}
    /* =========================
       APPS FULLSCREEN (.js dentro de apps-fullscreen/)
    ========================= */
    else if (
        lower.includes("apps-fullscreen/") &&
        lower.endsWith(".js")
    ) {

        const script = document.createElement("script");
        script.src = url;
        script.id = "fullscreenHTML";
        script.async = false;

        document.body.appendChild(script);
    }

    /* =========================
       HTML → IFRAME
    ========================= */
    else if (lower.endsWith(".html")) {

        const iframe = document.createElement("iframe");
        iframe.src = url;
        iframe.style.width = "100%";
        iframe.style.height = "100%";
        iframe.style.border = "none";
        iframe.style.background = "transparent";
        iframe.allow = "autoplay";

        display.appendChild(iframe);
    }
}
/* =========================
   MENU SYSTEM
========================= */

document.addEventListener("DOMContentLoaded", () => {

const menuButton = document.getElementById("menuButton");
const menuDropdown = document.getElementById("menuDropdown");

menuButton.addEventListener("click", () => {

    const open = menuDropdown.style.display === "flex";
    menuDropdown.style.display = open ? "none" : "flex";

    menuButton.classList.toggle("open", !open);


});

document.querySelectorAll(".menuItem").forEach(item => {

    item.addEventListener("click", () => {

        menuDropdown.style.display = "none";
        menuButton.classList.remove("open");

        /* SAME RESET AS GAME BUTTON */

        document.getElementById("menuContent").style.display = "none";

        if (currentAudio) {
            currentAudio.pause();
            currentAudio = null;
        }

        const existingFullscreen = document.getElementById("fullscreenHTML");
        if (existingFullscreen) existingFullscreen.remove();

        showContent(item.dataset.page);

    });

});
document.addEventListener("click", (e) => {

    if (!menuButton.contains(e.target) && !menuDropdown.contains(e.target)) {
       menuDropdown.style.display = "none";
menuButton.classList.remove("open");
    }

});
});
// Close menu on ESC key
document.addEventListener("keydown", (e) => {
    if (e.key === "Escape") {
        const menuDropdown = document.getElementById("menuDropdown");
        const menuButton = document.getElementById("menuButton");

        if (menuDropdown.style.display === "flex") {
            menuDropdown.style.display = "none";
            menuButton.classList.remove("open");
        }
    }
});
</script>
